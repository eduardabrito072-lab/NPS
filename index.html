<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>NPS System</title>

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    #area-captura {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #branding {
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 15px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <div id="area-captura">
    <div id="branding">NPS SYSTEM BY EDUARDA</div>

    <h2>Resultado NPS</h2>
    <p>Promotores: 70%</p>
    <p>Neutros: 20%</p>
    <p>Detratores: 10%</p>
  </div>

  <button onclick="capturarTela()">Baixar imagem</button>

  <script>
    function capturarTela() {
      const elemento = document.getElementById("area-captura");

      html2canvas(elemento).then(canvas => {
        const link = document.createElement("a");
        link.download = "nps-eduarda.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>

</body>
</html>
