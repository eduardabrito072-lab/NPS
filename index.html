<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NPS Ranking Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #1e1e1e;
  --border-dim: #161616;

  --text: #e8e8e8;

  /* 🔥 CORRIGIDO */
  --dim: #8a8a8a;
  --green: #22c55e;

  --gold:   #FFD700;
  --silver: #C0C0C0;
  --bronze: #CD7F32;
}

body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }
#app { max-width: 400px; margin: 0 auto; padding-bottom: 40px; }

/* TABS */
.tabs {
  display: flex; background: #0d0d0d;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.tab-btn {
  flex: 1; padding: 13px 0;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--dim); font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; cursor: pointer;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

.content { padding: 14px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 14px;
}

.lbl {
  font-size: 10px; font-weight: 700; color: var(--dim);
  text-transform: uppercase; margin-bottom: 6px; display: block;
}

.input-field {
  width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
  border-radius: 8px; color: #fff; padding: 11px 12px; margin-bottom: 12px;
}

.btn-primary {
  width: 100%; background: var(--green); color: #000;
  border: none; border-radius: 8px; padding: 12px; font-weight: 700;
}

.score-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}

.score-btn {
  padding: 7px 0;
  border-radius: 7px;
  border: 2px solid transparent;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  color: #000;
  opacity: 0.5;
}

.score-btn.selected { opacity: 1; }

/* cores */
.score-btn[data-v="1"],
.score-btn[data-v="2"],
.score-btn[data-v="3"],
.score-btn[data-v="4"],
.score-btn[data-v="5"],
.score-btn[data-v="6"] { background: #ef4444; }

.score-btn[data-v="7"],
.score-btn[data-v="8"] { background: #facc15; }

.score-btn[data-v="9"],
.score-btn[data-v="10"] { background: var(--green); }

/* ranking */
.rank-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px;
  border-bottom: 1px solid var(--border-dim);
}

.pos { min-width: 26px; text-align: center; color: var(--dim); }

.bar-container { flex: 1; }

.op-info {
  display: flex; justify-content: space-between;
  margin-bottom: 5px;
}

.pts-total { color: var(--dim); }

.bar-bg { height: 5px; background: #1a1a1a; border-radius: 3px; }
.bar-fill { height: 100%; background: var(--green); }

#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: #1a1a1a;
  padding: 10px 18px;
  border-radius: 10px;
  opacity: 0;
}

#toast.show { opacity: 1; }
</style>
</head>

<body>
<div id="app">

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('ranking')">🏆 Ranking</button>
<button class="tab-btn" onclick="switchTab('lancar')">➕ Lançar</button>
</div>

<div class="content">

<div id="tab-ranking" class="tab-panel active">
<select id="rank-month" class="input-field" onchange="renderRanking()"></select>
<div id="ranking-list"></div>
</div>

<div id="tab-lancar" class="tab-panel">
<select id="select-op" class="input-field"></select>
<input type="date" id="input-date" class="input-field">

<div class="score-grid" id="score-grid"></div>

<button class="btn-primary" onclick="addLaunch()">Salvar</button>
</div>

</div>
</div>

<script>
let operators = ["Liz","Natália","Carolina","Alef","Davi"];
let launches = [];

function init() {
  const grid = document.getElementById('score-grid');
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'score-btn';
    btn.dataset.v = i;
    btn.textContent = i;
    btn.onclick = () => selectScore(i, btn);
    grid.appendChild(btn);
  }
  renderRanking();
}
let selected = null;

function selectScore(val, btn) {
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = val;
}

function addLaunch() {
  const name = document.getElementById('select-op').value;
  launches.push({name, score:selected});
  renderRanking();
}

function renderRanking() {
  const map = {};
  launches.forEach(l=>{
    if(l.score>=9) map[l.name]=(map[l.name]||0)+1;
  });

  const list = operators.map(n=>({name:n,total:map[n]||0}))
  .sort((a,b)=>b.total-a.total);

  document.getElementById('ranking-list').innerHTML =
    list.map((op,i)=>`
      <div class="rank-row">
        <div class="pos">${i+1}º</div>
        <div class="bar-container">
          <div class="op-info">
            <div>${op.name}</div>
            <div class="pts-total">${op.total} PTS</div>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${op.total*20}%"></div>
          </div>
        </div>
      </div>
    `).join('');
}

function switchTab(t){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

init();
</script>
</body>
</html>
