<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>NPS Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* (SEU CSS ORIGINAL — NÃO MEXI EM NADA) */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0a0a0a !important; color-scheme: dark; width: 100%; min-height: 100vh; min-height: 100dvh; }
body { font-family: 'DM Sans', sans-serif; color: #e8e8e8; }
:root { --border:#1e1e1e; --border-dim:#161616; --dim:#555; --green:#4ade80; --gold:#FFD700; --silver:#C0C0C0; --bronze:#CD7F32; }
#app { width:100%; padding-bottom:env(safe-area-inset-bottom,40px); }

/* resto do CSS igual... */
</style>
</head>

<body>
<div id="app">
  <div id="toast"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ranking')">🏆 Ranking</button>
    <button class="tab-btn" onclick="switchTab('lancar')">➕ Lançar</button>
    <button class="tab-btn" onclick="switchTab('captura')">📸 Captura</button>
    <button class="tab-btn" onclick="switchTab('config')">⚙️ Config</button>
  </div>

  <div class="content">

    <div id="tab-ranking" class="tab-panel active">
      <div class="card">
        <label class="lbl">Visualizar Mês</label>
        <select id="rank-month" class="input-field" onchange="renderRanking()"></select>
      </div>
      <div class="last-updated" id="last-updated"></div>
      <div class="ranking-card">
        <div class="ranking-head">
          <span class="ranking-head-title">📊 PERFORMANCE NPS</span>
          <span id="display-month"></span>
        </div>
        <div id="ranking-list"></div>
      </div>
    </div>

    <div id="tab-lancar" class="tab-panel">
      <div class="card">
        <label class="lbl">Operador</label>
        <select id="select-op" class="input-field"></select>

        <label class="lbl">Data</label>
        <input type="date" id="input-date" class="input-field">

        <label class="lbl">Nota</label>
        <div class="score-grid" id="score-grid"></div>

        <input type="hidden" id="selected-score">
        <button class="btn-primary" onclick="addLaunch()">Salvar</button>
      </div>
    </div>

    <div id="tab-captura" class="tab-panel">
      <div class="card">
        <label class="lbl">Mês</label>
        <select id="capture-month-sel" class="input-field" onchange="renderCapture()"></select>
      </div>

      <div id="capture-area">
        <div id="capture-list"></div>
      </div>

      <button class="btn-secondary" onclick="exportImage()">Salvar imagem</button>
    </div>

    <div id="tab-config" class="tab-panel">
      <div class="card">
        <input type="text" id="new-op-name" class="input-field">
        <button class="btn-primary" onclick="addOperator()">Adicionar</button>
      </div>
      <div id="manage-ops-list"></div>
    </div>

  </div>
</div>

<script>
const K_OPS="nps_ops_v8";
const K_DATA="nps_data_v8";
const K_UPDATED="nps_updated_v8";

/* ✅ AQUI ESTÁ A ALTERAÇÃO QUE VOCÊ QUERIA */
const OPERATORS = [
  "Lucas","Eliane","Pedro Henrique","Kaio","Antonio","Claudinara","Daniele","Michele","Mariana","Davi",
  "Cledir","Liz","Carolina","Elienilde","Fagner",
  "Blenda","Eduarda","Ana Luisa","Cristina","Elisangela","Fernanda Emil","Eduarda da M","Lucifabio","Ana Paula","Pedro Ferreira",
  "Jucilene","Ester","Ayslan","Marilene","Taciane",
  "Barbara","Andreia","Elisabete","Nayane","Calita","Daiane","Irlane","Vanessa","Janildo","Tayná",
  "Alef","Fernanda O","Leila","Ana Paula","Poliana",
  "Natália","Izabella","Camila","Sunamita","Fernanda","Tatiana","Rafaella","Thais",
  "Creusa","Patrícia","Erika","Rafael Reinan","Elinaldo","Fernanda Fari",
  "Mirllem","Danyella","Marilia","Glaucia","Rafael Manoel","Leonardo","Eder","Fabio",
  "Nathalia","Valdilene","Vanessa","Cicera","Lara","Sandra","Sara Safira"
];

let operators=JSON.parse(localStorage.getItem(K_OPS))||OPERATORS;
let launches=JSON.parse(localStorage.getItem(K_DATA))||[];
let lastUpdate=localStorage.getItem(K_UPDATED)||null;

function init(){
  const grid=document.getElementById('score-grid');
  for(let i=1;i<=10;i++){
    const btn=document.createElement('button');
    btn.className='score-btn';
    btn.textContent=i;
    btn.onclick=()=>selectScore(i,btn);
    grid.appendChild(btn);
  }
  populateMonths('rank-month');
  populateMonths('capture-month-sel');
  renderAll();
}

function populateMonths(id){
  const sel=document.getElementById(id);
  const now=new Date();
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=d.toISOString().slice(0,7);
    sel.innerHTML+=`<option value="${val}">${val}</option>`;
  }
}

function selectScore(v,btn){
  document.querySelectorAll('.score-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('selected-score').value=v;
}

function save(){
  localStorage.setItem(K_OPS,JSON.stringify(operators));
  localStorage.setItem(K_DATA,JSON.stringify(launches));
}

function renderAll(){
  renderOpSelectors();
  renderRanking();
}

function renderOpSelectors(){
  document.getElementById('select-op').innerHTML=
    operators.map(o=>`<option>${o}</option>`).join('');
}

function renderRanking(){
  document.getElementById('ranking-list').innerHTML=
    operators.map(o=>`<div>${o}</div>`).join('');
}

function addLaunch(){
  const name=document.getElementById('select-op').value;
  const score=document.getElementById('selected-score').value;
  if(!score)return alert("Selecione nota");
  launches.push({name,score});
  save();
  renderRanking();
}

function addOperator(){
  const name=document.getElementById('new-op-name').value;
  operators.push(name);
  save();
  renderAll();
}

function switchTab(t){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

init();
</script>
</body>
</html>
