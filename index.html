<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPS Ranking</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; font-family: 'DM Sans', sans-serif; color: #e8e8e8; }
    #app { max-width: 400px; margin: 0 auto; padding-bottom: 24px; }
    .tabs { display: flex; background: #111; border-bottom: 1px solid #1e1e1e; position: sticky; top: 0; z-index: 100; }
    .tab-btn { flex: 1; padding: 14px 0; background: none; border: none; color: #555; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #4ade80; border-bottom: 2px solid #4ade80; }
    .content { padding: 12px 14px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Estilo igual à sua foto */
    .month-filter-container { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .month-select { flex: 1; background: #0d0d0d; border: 1px solid #333; color: #e8e8e8; padding: 8px; border-radius: 6px; font-family: inherit; }
    .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .rank-title { font-size: 15px; font-weight: 700; }
    .export-btn { background: #1a2e1a; border: 1px solid #2a5a2a; border-radius: 7px; color: #4ade80; font-size: 12px; font-weight: 700; padding: 6px 12px; cursor: pointer; }
    .ranking-card { background: #0d0d0d; border-radius: 10px; border: 1px solid #1e1e1e; overflow: hidden; }
    .img-head { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px 12px; border-bottom: 1px solid #1e1e1e; }
    .img-head-title { font-size: 13px; font-weight: 700; color: #4ade80; }
    .rank-row { display: flex; align-items: center; gap: 8px; padding: 10px; background: #0d0d0d; border-bottom: 1px solid #141414; border-left: 3px solid transparent; }
    .pos { font-size: 13px; font-weight: 700; min-width: 24px; color: #555; }
    .bar-track { height: 4px; background: #1a1a1a; border-radius: 2px; margin-top: 4px; width: 100%; }
    .bar-fill { height: 100%; border-radius: 2px; background: #4ade80; }
    .pts-num { font-size: 15px; font-weight: 700; }
    .pts-lbl { font-size: 10px; color: #555; }

    /* Formulários */
    .card { background: #111; border-radius: 12px; padding: 16px; border: 1px solid #1e1e1e; margin-bottom: 10px; }
    .lbl { display: block; font-size: 11px; color: #555; margin-bottom: 6px; text-transform: uppercase; }
    .input-field { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 7px; color: #fff; padding: 10px; margin-bottom: 15px; font-family: inherit; }
    .submit-btn { width: 100%; background: #4ade80; color: #111; border: none; border-radius: 9px; padding: 14px; font-weight: 700; cursor: pointer; }
    
    /* Config list */
    .op-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #0d0d0d; border-radius: 6px; margin-bottom: 5px; border: 1px solid #222; }
    .btn-del { background: none; border: 1px solid #3a1a1a; color: #f87171; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
  </style>
</head>
<body>

<div id="app">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ranking')">🏆 Ranking</button>
    <button class="tab-btn" onclick="switchTab('lancar')">➕ Lançar</button>
    <button class="tab-btn" onclick="switchTab('config')">⚙️ Config</button>
  </div>

  <div class="content">
    <div id="tab-ranking" class="tab-panel active">
      <div class="month-filter-container">
        <label class="lbl" style="margin:0">Mês Ref:</label>
        <select id="filter-month" class="month-select" onchange="renderRanking()"></select>
      </div>
      <div class="rank-header">
        <div>
          <div class="rank-title">NPS Ranking</div>
          <div style="font-size:11px; color:#555" id="total-evals"></div>
        </div>
        <button class="export-btn" onclick="capture()">⬆️ Exportar</button>
      </div>
      <div class="ranking-card" id="ranking-card">
        <div class="img-head">
          <span class="img-head-title">📊 PERFORMANCE NPS</span>
          <span id="display-month-img" style="font-size:12px; color:#555"></span>
        </div>
        <div id="ranking-rows"></div>
      </div>
    </div>

    <div id="tab-lancar" class="tab-panel">
      <div class="card">
        <label class="lbl">Operador</label>
        <select id="op-select" class="input-field"></select>
        <label class="lbl">Data</label>
        <input type="date" id="input-date" class="input-field">
        <label class="lbl">Nota (0 a 10)</label>
        <input type="number" id="input-score" class="input-field" min="0" max="10">
        <button class="submit-btn" onclick="addLaunch()">Confirmar Lançamento</button>
      </div>
    </div>

    <div id="tab-config" class="tab-panel">
      <div class="card">
        <div class="rank-title" style="margin-bottom:10px">Gerenciar Equipe</div>
        <input type="text" id="new-op-name" class="input-field" placeholder="Nome do Operador">
        <input type="number" id="new-op-base" class="input-field" placeholder="Pontos Iniciais (Base)">
        <button class="submit-btn" onclick="addOperator()">Adicionar Operador</button>
      </div>
      <label class="lbl">Lista de Operadores</label>
      <div id="ops-list"></div>
    </div>
  </div>
</div>

<script>
  let operators = JSON.parse(localStorage.getItem('nps_ops_v5')) || [
    { name: "Liz", base: 42 }, { name: "Natália", base: 21 }, { name: "Carolina", base: 15 },
    { name: "Alef", base: 15 }, { name: "Davi", base: 14 }, { name: "Daniele", base: 13 }
  ];
  let launches = JSON.parse(localStorage.getItem('nps_data_v5')) || [];

  function init() {
    const monthSel = document.getElementById('filter-month');
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const val = d.toISOString().slice(0, 7);
      const label = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
      monthSel.innerHTML += `<option value="${val}">${label}</option>`;
    }
    document.getElementById('input-date').value = now.toISOString().slice(0, 10);
    renderAll();
  }

  function renderAll() {
    localStorage.setItem('nps_ops_v5', JSON.stringify(operators));
    localStorage.setItem('nps_data_v5', JSON.stringify(launches));
    renderRanking();
    renderConfig();
    document.getElementById('op-select').innerHTML = operators.map(o => `<option value="${o.name}">${o.name}</option>`).join('');
  }

  function renderRanking() {
    const m = document.getElementById('filter-month').value;
    document.getElementById('display-month-img').innerText = m;
    const monthData = launches.filter(l => l.date.startsWith(m));
    document.getElementById('total-evals').innerText = `${monthData.length} avaliações no período`;

    const scores = {};
    monthData.forEach(l => { if(l.score >= 9) scores[l.name] = (scores[l.name] || 0) + 1; });

    const rank = operators.map(op => ({
      name: op.name,
      total: parseInt(op.base) + (scores[op.name] || 0),
      monthPts: (scores[op.name] || 0)
    })).sort((a,b) => b.total - a.total);

    const max = Math.max(...rank.map(r => r.total), 1);
    document.getElementById('ranking-rows').innerHTML = rank.map((op, i) => `
      <div class="rank-row">
        <span class="pos">${i+1}º</span>
        <div style="flex:1">
          <div style="display:flex; justify-content:space-between; align-items:baseline">
            <span style="font-size:13px">${op.name} ${op.monthPts > 0 ? `<small style="color:#4ade80; margin-left:4px">+${op.monthPts}</small>` : ''}</span>
            <span class="pts-num">${op.total}<span class="pts-lbl">pts</span></span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${(op.total/max)*100}%"></div></div>
        </div>
      </div>
    `).join('');
  }

  function addLaunch() {
    const name = document.getElementById('op-select').value;
    const date = document.getElementById('input-date').value;
    const score = document.getElementById('input-score').value;
    if(!score) return;
    launches.unshift({ name, date, score: parseInt(score) });
    renderAll();
    switchTab('ranking');
  }

  function addOperator() {
    const name = document.getElementById('new-op-name').value;
    const base = document.getElementById('new-op-base').value || 0;
    if(!name) return;
    operators.push({ name, base: parseInt(base) });
    document.getElementById('new-op-name').value = "";
    document.getElementById('new-op-base').value = "";
    renderAll();
  }

  function deleteOp(i) {
    if(confirm("Remover operador?")) { operators.splice(i, 1); renderAll(); }
  }

  function renderConfig() {
    document.getElementById('ops-list').innerHTML = operators.map((o, i) => `
      <div class="op-item">
        <span>${o.name} (Base: ${o.base})</span>
        <button class="btn-del" onclick="deleteOp(${i})">Excluir</button>
      </div>
    `).join('');
  }

  function switchTab(t) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    event.currentTarget?.classList.add('active');
  }

  async function capture() {
    const canvas = await html2canvas(document.getElementById('ranking-card'), { backgroundColor: "#0d0d0d", scale: 2 });
    const a = document.createElement('a');
    a.href = canvas.toDataURL(); a.download = 'nps.png'; a.click();
  }

  init();
</script>
</body>
</html>
